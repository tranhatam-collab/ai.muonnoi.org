<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nhà Chung Admin Lite</title>
  <meta name="description" content="Nhà Chung Admin Lite thuộc hệ muonnoi.org, với nội dung rõ trạng thái, không tracking và ưu tiên người dùng thật." />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="canonical" href="https://ai.muonnoi.org/app/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nhà Chung Admin Lite" />
  <meta property="og:description" content="Nhà Chung Admin Lite thuộc hệ muonnoi.org, với nội dung rõ trạng thái, không tracking và ưu tiên người dùng thật." />
  <meta property="og:url" content="https://ai.muonnoi.org/app/" />
  <meta property="og:image" content="https://ai.muonnoi.org/assets/og-cover.svg" />
  <meta name="twitter:card" content="summary_large_image" />
</head>
<body>
  <main class="shell shell-center">
    <section class="card auth-card">
      <div class="brand-block">
        <div class="brand-mark">NC</div>
        <div>
          <h1>Nhà Chung Admin Lite</h1>
          <p>Đang kiểm tra phiên đăng nhập và chuyển hướng...</p>
        </div>
      </div>

      <p id="bootMessage" class="message muted">Đang khởi động ứng dụng...</p>
    </section>
  </main>

  <script src="/assets/api.js"></script>
  <script src="/assets/auth.js"></script>
  <script>
    const bootMessage = document.getElementById("bootMessage");

    async function boot() {
      try {
        const me = await window.Auth.getCurrentUser();
        if (me) {
          if (!window.Auth.canAccessApp(me)) {
            bootMessage.textContent = "Tài khoản này không có quyền vào app nội bộ. Đang chuyển về hồ sơ...";
            window.location.href = "/profile/";
            return;
          }
          bootMessage.textContent = "Đã nhận diện phiên đăng nhập. Đang vào dashboard...";
          window.location.href = "/app/dashboard/";
          return;
        }
      } catch (_error) {
        // ignore
      }

      bootMessage.textContent = "Chưa đăng nhập. Đang chuyển tới login...";
      window.location.href = "/app/login/";
    }

    boot();
  </script>
</body>
</html>
